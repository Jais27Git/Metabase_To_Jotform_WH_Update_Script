# =============================================================
# .github/workflows/sync_warehouses.yml
# -------------------------------------------------------------
# Purpose:
#     Runs metabase_to_jotform_dropdown.py on a daily schedule
#     via GitHub Actions. Fetches warehouses from Metabase and
#     updates Jotform dropdown options automatically.
#
# Schedule:
#     Runs every day at 7:00 AM IST (1:30 AM UTC)
#
# Secrets required (set in GitHub repo Settings > Secrets):
#     METABASE_API_KEY  — your Metabase API key
#     JOTFORM_API_KEY   — your Jotform API key
# =============================================================

name: Sync Warehouses to Jotform

on:
  schedule:
    - cron: "30 4 * * *"    # 10:00 AM IST daily

  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  sync:
    name: Metabase → Jotform Dropdown Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        env:
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
          JOTFORM_API_KEY: ${{ secrets.JOTFORM_API_KEY }}
        run: python metabase_to_jotform_dropdown.py
